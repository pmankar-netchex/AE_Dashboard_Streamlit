# Production Streamlit configuration for Azure App Service deployment
# These settings are required when running behind Azure's reverse proxy

[server]
# Run without browser (required for Docker/server deployment)
headless = true

# Bind to all interfaces (required for container networking)
address = "0.0.0.0"

# Port (matches WEBSITES_PORT App Setting and EXPOSE in Dockerfile)
port = 8501

# Disable CORS — we're behind Azure App Service's trusted reverse proxy
# Without this, WebSocket connections may be blocked
enableCORS = false

# Disable XSRF protection — handled by Azure's infrastructure
# Without this, POST requests through the proxy may fail
enableXsrfProtection = false

[browser]
# Don't collect usage stats
gatherUsageStats = false
