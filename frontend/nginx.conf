worker_processes 1;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the API container. API_HOST is templated at deploy time.
    location /api/ {
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Forward Easy Auth principal header explicitly so it survives proxy hop
      proxy_set_header X-MS-CLIENT-PRINCIPAL $http_x_ms_client_principal;
      proxy_set_header X-MS-CLIENT-PRINCIPAL-NAME $http_x_ms_client_principal_name;
      proxy_set_header X-MS-CLIENT-PRINCIPAL-ID $http_x_ms_client_principal_id;
      proxy_set_header X-Internal-Api-Key $INTERNAL_API_KEY;
      proxy_pass http://$API_HOST/api/;
    }

    # Hashed assets — long cache
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback
    location / {
      try_files $uri /index.html;
      add_header Cache-Control "no-cache";
    }
  }
}
