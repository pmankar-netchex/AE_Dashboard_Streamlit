# Build Docker image, push to ACR, update the Container App.
# Prerequisites: one-time Bicep deploy (see README) and GitHub secrets/variables.

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: ae-dashboard

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # OIDC (recommended): set AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      # Alternative: replace this step with azure/login using creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI — Container Apps extension
        run: az extension add --name containerapp --upgrade 2>/dev/null || az extension update --name containerapp

      - name: Log in to ACR (CLI)
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: az acr login --name "$ACR_NAME"

      - name: Build and push image
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
          IMAGE_TAG="${GITHUB_SHA}"
          docker build -t "$ACR_LOGIN_SERVER/${IMAGE_NAME}:$IMAGE_TAG" .
          docker push "$ACR_LOGIN_SERVER/${IMAGE_NAME}:$IMAGE_TAG"
          docker tag "$ACR_LOGIN_SERVER/${IMAGE_NAME}:$IMAGE_TAG" "$ACR_LOGIN_SERVER/${IMAGE_NAME}:latest"
          docker push "$ACR_LOGIN_SERVER/${IMAGE_NAME}:latest"

      - name: Update Container App
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
          RG_NAME: ${{ vars.AZURE_RESOURCE_GROUP }}
          APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --image "$ACR_LOGIN_SERVER/${IMAGE_NAME}:${GITHUB_SHA}"
          az containerapp ingress update \
            --name "$APP_NAME" \
            --resource-group "$RG_NAME" \
            --target-port 8501
