# AE Dashboard — Azure DevOps CI/CD Pipeline
#
# Prerequisites:
#   1. Azure DevOps service connection to your Azure subscription
#      (Project Settings → Service connections → New → Azure Resource Manager)
#      Name this connection and set the AZURE_SERVICE_CONNECTION pipeline variable.
#
#   2. Azure DevOps service connection to Azure Container Registry (ACR)
#      (Project Settings → Service connections → New → Docker Registry → ACR)
#      Name this connection and set the ACR_SERVICE_CONNECTION pipeline variable.
#
# Required pipeline variables (set in Azure DevOps UI: Pipeline → Edit → Variables):
#   ACR_SERVICE_CONNECTION   - Azure DevOps service connection name for ACR
#   AZURE_SERVICE_CONNECTION - Azure DevOps service connection name for Azure subscription
#   ACR_LOGIN_SERVER         - ACR login server hostname (e.g., aedashboard.azurecr.io)
#   ACR_REPOSITORY           - ACR repository name (e.g., ae-dashboard, matching $AppName)
#   APP_NAME                 - Azure App Service name (e.g., ae-dashboard)
#   RESOURCE_GROUP_NAME      - Azure Resource Group containing the App Service
#
# Workflow:
#   Push to main → Build stage (Docker build + push to ACR) → Deploy stage (update App Service container)
#   Infrastructure changes are handled separately via scripts/deploy.ps1

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: acrServiceConnection
    value: '$(ACR_SERVICE_CONNECTION)'    # Set in Azure DevOps pipeline variables
  - name: azureServiceConnection
    value: '$(AZURE_SERVICE_CONNECTION)'  # Set in Azure DevOps pipeline variables
  - name: acrLoginServer
    value: '$(ACR_LOGIN_SERVER)'           # ACR login server (e.g., aedashboard.azurecr.io)
  - name: acrRepository
    value: '$(ACR_REPOSITORY)'             # ACR repository name (e.g., ae-dashboard)
  - name: appName
    value: '$(APP_NAME)'                   # Azure App Service name
  - name: resourceGroupName
    value: '$(RESOURCE_GROUP_NAME)'        # Resource group containing the App Service

stages:
  - stage: Build
    displayName: 'Build and Push Docker Image'
    jobs:
      - job: BuildAndPush
        displayName: 'Build and push to ACR'
        steps:
          - task: Docker@2
            displayName: 'Build and push Docker image to ACR'
            inputs:
              containerRegistry: '$(acrServiceConnection)'
              repository: '$(acrRepository)'
              command: 'buildAndPush'
              Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: 'Deploy to Azure App Service'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAppService
        displayName: 'Deploy container to App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: 'Update App Service container image'
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    appName: '$(appName)'
                    containers: '$(acrLoginServer)/$(acrRepository):$(Build.BuildId)'
