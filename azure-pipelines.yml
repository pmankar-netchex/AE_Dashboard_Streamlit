# AE Dashboard — Azure DevOps CI/CD Pipeline (Zip Deploy)
#
# Prerequisites:
#   Azure DevOps service connection to your Azure subscription
#   (Project Settings > Service connections > Azure Resource Manager)
#
# Required pipeline variables (set in Azure DevOps UI):
#   AZURE_SERVICE_CONNECTION - Service connection name for Azure
#   APP_NAME                 - Azure App Service name (e.g., netchex-ae-dashboard)
#   RESOURCE_GROUP_NAME      - Azure Resource Group name

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.11'
  azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
  appName: '$(APP_NAME)'
  resourceGroupName: '$(RESOURCE_GROUP_NAME)'

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildApp
        displayName: 'Build and Package'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Set Python version'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install dependencies (validation)'

          - task: ArchiveFiles@2
            displayName: 'Package application'
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true
              excludePatterns: |
                **/__pycache__/**
                **/.git/**
                **/.venv/**
                **/venv/**
                **/data/**
                **/scripts/**
                **/infra/**
                **/docs/**
                **/.env
                **/.env.local
                **/.sisyphus/**
                **/deploy-package/**
                **/*.zip
                **/*.md

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifact: drop'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'drop'

  - stage: Deploy
    displayName: 'Deploy to Azure App Service'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAzure
        displayName: 'Deploy Application'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webAppLinux'
                    appName: '$(appName)'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
                    runtimeStack: 'PYTHON|3.11'
                    deploymentMethod: 'zipDeploy'
